<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="112" ry="112" fill="url(#shine)"/>
  <!-- Calendar base -->
  <rect x="96" y="140" width="320" height="280" rx="28" ry="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>
  <!-- Calendar top bar -->
  <rect x="96" y="140" width="320" height="80" rx="28" ry="28" fill="rgba(255,255,255,0.25)"/>
  <rect x="96" y="188" width="320" height="32" fill="rgba(255,255,255,0.25)"/>
  <!-- Calendar rings -->
  <rect x="176" y="108" width="24" height="56" rx="12" fill="white" opacity="0.9"/>
  <rect x="312" y="108" width="24" height="56" rx="12" fill="white" opacity="0.9"/>
  <!-- Grid dots -->
  <circle cx="168" cy="284" r="14" fill="white" opacity="0.9"/>
  <circle cx="256" cy="284" r="14" fill="white" opacity="0.9"/>
  <circle cx="344" cy="284" r="14" fill="rgba(255,255,255,0.4)"/>
  <circle cx="168" cy="346" r="14" fill="white" opacity="0.9"/>
  <circle cx="256" cy="346" r="14" fill="rgba(255,255,255,0.4)"/>
  <circle cx="344" cy="346" r="14" fill="rgba(255,255,255,0.4)"/>
  <!-- Checkmark on one dot -->
  <circle cx="168" cy="284" r="18" fill="rgba(16,185,129,0.9)"/>
  <polyline points="158,284 165,292 180,276" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Month label area -->
  <rect x="130" y="156" width="100" height="22" rx="6" fill="rgba(255,255,255,0.5)"/>
  <rect x="240" y="156" width="40" height="22" rx="6" fill="rgba(255,255,255,0.3)"/>
</svg>
